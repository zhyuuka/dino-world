<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图标版本对比</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #fff;
    min-height: 100vh;
    padding: 40px 20px;
  }
  h1 {
    text-align: center;
    font-size: 32px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #f093fb, #f5576c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    text-align: center;
    color: #8892b0;
    margin-bottom: 40px;
    font-size: 14px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .item {
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 16px;
    transition: all 0.3s ease;
    border: 2px solid transparent;
  }
  .item:hover {
    transform: translateY(-4px);
    background: rgba(255,255,255,0.08);
    border-color: #f5576c;
  }
  .item.latest {
    border-color: #4ade80;
    box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
  }
  .num {
    text-align: center;
    font-size: 13px;
    color: #8892b0;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .item.latest .num {
    color: #4ade80;
  }
  .img-wrap {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.2);
    border-radius: 12px;
    overflow: hidden;
  }
  .img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .label {
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
    color: #a8b2d1;
  }
  .latest-badge {
    display: inline-block;
    background: #4ade80;
    color: #000;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    margin-left: 6px;
  }
</style>
</head>
<body>
  <h1>🦖 图标版本对比</h1>
  <p class="subtitle">共 22 个版本 · 点击可放大查看</p>
  <div class="grid">
    <div class="item"><div class="num">版本 1</div><div class="img-wrap"><img src="history/page-2026-07-21T16-02-39-847.png"></div><div class="label">初始设计</div></div>
    <div class="item"><div class="num">版本 2</div><div class="img-wrap"><img src="history/page-2026-07-21T16-04-25-156.png"></div><div class="label">调整轮廓</div></div>
    <div class="item"><div class="num">版本 3</div><div class="img-wrap"><img src="history/page-2026-07-21T16-05-52-350.png"></div><div class="label">优化形状</div></div>
    <div class="item"><div class="num">版本 4</div><div class="img-wrap"><img src="history/page-2026-07-21T16-07-08-131.png"></div><div class="label">加细节</div></div>
    <div class="item"><div class="num">版本 5</div><div class="img-wrap"><img src="history/page-2026-07-21T16-09-10-806.png"></div><div class="label">改视角</div></div>
    <div class="item"><div class="num">版本 6</div><div class="img-wrap"><img src="history/page-2026-07-21T16-10-15-248.png"></div><div class="label">调比例</div></div>
    <div class="item"><div class="num">版本 7</div><div class="img-wrap"><img src="history/page-2026-07-21T16-12-14-847.png"></div><div class="label">加牙齿</div></div>
    <div class="item"><div class="num">版本 8</div><div class="img-wrap"><img src="history/page-2026-07-21T16-14-10-463.png"></div><div class="label">改配色</div></div>
    <div class="item"><div class="num">版本 9</div><div class="img-wrap"><img src="history/page-2026-07-21T16-15-53-974.png"></div><div class="label">加角</div></div>
    <div class="item"><div class="num">版本 10</div><div class="img-wrap"><img src="history/page-2026-07-21T16-17-36-010.png"></div><div class="label">修正角</div></div>
    <div class="item"><div class="num">版本 11</div><div class="img-wrap"><img src="history/page-2026-07-21T16-19-07-813.png"></div><div class="label">侧面尝试</div></div>
    <div class="item"><div class="num">版本 12</div><div class="img-wrap"><img src="history/page-2026-07-21T16-21-25-059.png"></div><div class="label">正面头</div></div>
    <div class="item"><div class="num">版本 13</div><div class="img-wrap"><img src="history/page-2026-07-21T16-22-41-870.png"></div><div class="label">优化嘴</div></div>
    <div class="item"><div class="num">版本 14</div><div class="img-wrap"><img src="history/page-2026-07-21T16-23-42-852.png"></div><div class="label">调眼睛</div></div>
    <div class="item"><div class="num">版本 15</div><div class="img-wrap"><img src="history/page-2026-07-21T16-25-02-181.png"></div><div class="label">加阴影</div></div>
    <div class="item"><div class="num">版本 16</div><div class="img-wrap"><img src="history/page-2026-07-21T16-26-29-830.png"></div><div class="label">调头部</div></div>
    <div class="item"><div class="num">版本 17</div><div class="img-wrap"><img src="history/page-2026-07-21T16-28-36-491.png"></div><div class="label">改比例</div></div>
    <div class="item"><div class="num">版本 18</div><div class="img-wrap"><img src="history/page-2026-07-21T16-30-04-136.png"></div><div class="label">优化细节</div></div>
    <div class="item"><div class="num">版本 19</div><div class="img-wrap"><img src="history/page-2026-07-21T16-31-15-981.png"></div><div class="label">加立体感</div></div>
    <div class="item"><div class="num">版本 20</div><div class="img-wrap"><img src="history/page-2026-07-21T16-32-40-109.png"></div><div class="label">调表情</div></div>
    <div class="item"><div class="num">版本 21</div><div class="img-wrap"><img src="history/page-2026-07-21T16-34-11-717.png"></div><div class="label">侧面全头</div></div>
    <div class="item latest"><div class="num">版本 22 <span class="latest-badge">最新</span></div><div class="img-wrap"><img src="history/page-2026-07-21T16-35-34-841.png"></div><div class="label">缩小调整</div></div>
  </div>
</body>
</html>
